<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro.js — SATB Choir</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1 {
            color: #333;
        }

        #score {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        button {
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            margin-right: 0.5rem;
        }

        .controls {
            margin: 1rem 0;
        }
    </style>
</head>

<body>
    <h1>SATB Choir — Sanctus</h1>
    <p>A four-part choral arrangement with soprano, alto, tenor, and bass voices.</p>
    <div id="score"></div>
    <div class="controls">
        <button id="play-all">Play All</button>
        <button id="play-sa">Play S+A</button>
        <button id="play-tb">Play T+B</button>
        <button id="stop">Stop</button>
    </div>

    <!-- Single script tag — no other dependencies needed -->
    <script src="https://cdn.jsdelivr.net/npm/@bassmoses/maestro-js/dist/maestro.umd.min.js"></script>
    <script>
        const chorale = new Maestro.Song({
            tempo: 76,
            timeSignature: '4/4',
            key: 'Bb',
            title: 'Sanctus',
            composer: 'Anonymous'
        })

        chorale.voice('soprano', { clef: 'treble' })
            .add('Bb4:h(mp) C5:q D5:q | Eb5:h D5:h | C5:q(mf) Bb4:q C5:h | Bb4:w(p)')

        chorale.voice('alto', { clef: 'treble' })
            .add('F4:h G4:q F4:q | G4:h F4:h | Eb4:q(mf) F4:q Eb4:h | D4:w(p)')

        chorale.voice('tenor', { clef: 'treble-8' })
            .add('D4:h Eb4:q F4:q | Bb4:h F4:h | G4:q(mf) F4:q G4:h | F4:w(p)')

        chorale.voice('bass', { clef: 'bass' })
            .add('Bb2:h Eb3:q F3:q | Eb3:h Bb3:h | F3:q(mf) F2:q C3:h | Bb2:w(p)')

        chorale.render('#score', { grandStaff: true, showBarNumbers: true })

        document.getElementById('play-all').addEventListener('click', () => chorale.play())
        document.getElementById('play-sa').addEventListener('click', () => chorale.play({ voices: ['soprano', 'alto'] }))
        document.getElementById('play-tb').addEventListener('click', () => chorale.play({ voices: ['tenor', 'bass'] }))
        document.getElementById('stop').addEventListener('click', () => chorale.stop())
    </script>
</body>

</html>
