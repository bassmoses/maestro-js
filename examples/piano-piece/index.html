<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro.js — Piano Piece</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1 {
            color: #333;
        }

        #sheet {
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
        }

        button {
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            margin-right: 0.5rem;
        }
    </style>
</head>

<body>
    <h1>Piano Piece</h1>
    <p>Melody with dynamics and chordal accompaniment.</p>
    <div id="sheet"></div>
    <button id="play">Play</button>
    <button id="stop">Stop</button>

    <!-- Single script tag — no other dependencies needed -->
    <script src="https://cdn.jsdelivr.net/npm/@bassmoses/maestro-js/dist/maestro.umd.min.js"></script>
    <script>
        const song = new Maestro.Song({
            tempo: 112,
            timeSignature: '4/4',
            key: 'D',
            instrument: 'piano'
        })

        song.voice('right', { clef: 'treble' })
            .add('D4:q(mp) F#4:q A4:h | A4:q(mf) G4:q F#4:h')
            .add('E4:q(mp) F#4:q G4:q F#4:q | D4:w(p)')

        song.voice('left', { clef: 'bass' })
            .add('[D2 A2]:h [D2 F#2]:h | [A2 C#3]:h [D2 A2]:h')
            .add('[G2 B2]:h [A2 C#3]:h | [D2 A2]:w')

        song.tempoAt(3, 92)

        song.render('#sheet', { grandStaff: true, showDynamics: true })

        document.getElementById('play').addEventListener('click', () => song.play())
        document.getElementById('stop').addEventListener('click', () => song.stop())
    </script>
</body>

</html>
